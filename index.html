<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's for Dinner? - Menu Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        <h1>What should I eat for dinner?</h1>
        <div class="menu-display">
            <div id="menu-card" class="menu-card">
                <img id="menu-image" src="" alt="Menu Image">
                <div id="menu-result">?</div>
            </div>
        </div>
        <button id="generate-btn">Get a Recommendation</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
