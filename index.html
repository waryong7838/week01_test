<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's for Dinner? - Menu Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        <h1>What should I eat for dinner?</h1>
        <div class="menu-display">
            <div id="menu-card" class="menu-card">
                <img id="menu-image" src="" alt="Menu Image">
                <div id="menu-result">?</div>
            </div>
        </div>
        <button id="generate-btn">Get a Recommendation</button>

        <hr class="divider">

        <div class="contact-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mbdpgdod" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
            <div id="form-status"></div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
