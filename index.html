<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">What's for Dinner? - Menu Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="controls-container">
        <button id="lang-toggle" class="lang-toggle" aria-label="Toggle Language">KO</button>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
    </div>
    
    <div class="container">
        <h1 id="main-heading">What should I eat for dinner?</h1>
        <div class="menu-display">
            <div id="menu-card" class="menu-card">
                <img id="menu-image" src="" alt="Menu Image">
                <div id="menu-result">?</div>
            </div>
        </div>
        <button id="generate-btn">Get a Recommendation</button>

        <hr class="divider">

        <div class="contact-section">
            <h2 id="contact-heading">Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mbdpgdod" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="email" name="email" id="email-input" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" id="message-input" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" id="submit-btn" class="submit-btn">Send Inquiry</button>
            </form>
            <div id="form-status"></div>
        </div>

        <hr class="divider">

        <div class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                
                var disqus_config = function () {
                this.page.url = "https://waryong7838.github.io/week01_test/";  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = "week01_test_main"; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                this.language = localStorage.getItem('lang') || 'en'; // Dynamically set language
                };
                
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://week01test.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
